<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QMATH — Тренажёр</title>
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="QMATH">
<meta name="description" content="Математический тренажёр: уравнения, планиметрия, двоичный код">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">

<style>
:root{
  --bg:#0a0e1a;
  --bg2:#111827;
  --gold:#f5c842;
  --surface:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.1);
  --text:rgba(255,255,255,1);
  --text-dim:rgba(255,255,255,0.45);
  --text-faint:rgba(255,255,255,0.25);
  --green:#4ade80;
  --red:#f87171;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;}

.app{width:100%;height:100%;min-height:100svh;position:relative;overflow:hidden;background:var(--bg);}

@media(min-width:700px){
  body{background:radial-gradient(ellipse at 30% 40%,#0d1428 0%,#060810 60%);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
  .app{width:420px;height:min(860px,95svh);min-height:unset;border-radius:44px;box-shadow:0 60px 140px rgba(0,0,0,0.8),0 0 0 1px rgba(255,255,255,0.06),inset 0 1px 0 rgba(255,255,255,0.08);overflow:hidden;}
}

.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;scrollbar-width:none;}
.page::-webkit-scrollbar{display:none}
.page.hidden-left{transform:translateX(-100%);opacity:0;pointer-events:none}
.page.hidden-right{transform:translateX(100%);opacity:0;pointer-events:none}

/* HOME */
.home-bg{background:linear-gradient(160deg,#0a0e1a 0%,#111827 60%,#0f1f3d 100%);min-height:100vh;padding:max(env(safe-area-inset-top),48px) 20px 32px;}
.status-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;font-size:11px;color:var(--text-faint);}
.app-logo{text-align:center;margin-bottom:32px}
.logo-text{font-size:28px;font-weight:800;letter-spacing:3px;color:#fff}
.logo-text span{color:var(--gold)}
.logo-sub{font-size:11px;color:var(--text-faint);letter-spacing:3px;margin-top:4px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px}
.stat-pill{background:var(--surface);border:0.5px solid var(--border);border-radius:16px;padding:14px 8px;text-align:center;}
.stat-n{font-size:22px;font-weight:700;color:var(--gold)}
.stat-l{font-size:10px;color:var(--text-faint);margin-top:3px;letter-spacing:1px}
.section-label{font-size:10px;color:var(--text-faint);letter-spacing:2.5px;margin-bottom:14px}
.topic-list{display:flex;flex-direction:column;gap:12px}
.topic-btn{display:flex;align-items:center;gap:16px;padding:18px 20px;border-radius:22px;cursor:pointer;border:none;text-align:left;transition:transform .15s,filter .15s;width:100%;}
.topic-btn:active{transform:scale(0.97);filter:brightness(0.9)}
.topic-eq{background:linear-gradient(135deg,#1a3a5c,#0e2340)}
.topic-geo{background:linear-gradient(135deg,#1a3d2e,#0e2318)}
.topic-bin{background:linear-gradient(135deg,#3d1a3d,#240e24)}
.topic-icon-wrap{width:50px;height:50px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.ico-eq{background:rgba(59,130,246,0.25)}
.ico-geo{background:rgba(34,197,94,0.25)}
.ico-bin{background:rgba(168,85,247,0.2)}
.topic-info{flex:1;min-width:0}
.topic-name{font-size:16px;font-weight:700;color:#fff;margin-bottom:3px}
.topic-detail{font-size:12px;color:var(--text-dim)}
.topic-arrow{font-size:20px;color:rgba(255,255,255,0.2);flex-shrink:0}

/* TASK PAGE */
.task-bg{background:var(--bg);height:100%;min-height:100vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom,16px);}
.task-top{padding:max(env(safe-area-inset-top),48px) 20px 16px;flex-shrink:0;}
.top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.back-circle{width:38px;height:38px;border-radius:50%;background:var(--surface);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:#fff;flex-shrink:0;transition:background .15s;}
.back-circle:active{background:rgba(255,255,255,0.12)}
.topic-badge{font-size:12px;color:var(--text-dim);font-weight:600;letter-spacing:1.5px}
.timer-circle{display:flex;align-items:center;gap:8px}
.timer-val{font-size:15px;font-weight:700;color:var(--gold);font-variant-numeric:tabular-nums}
.timer-start{font-size:11px;color:var(--text-dim);cursor:pointer;padding:5px 10px;border:0.5px solid var(--border);border-radius:8px;transition:.15s;}
.timer-start:active{background:var(--surface)}
.diff-row{display:flex;gap:8px}
.dpill{padding:7px 16px;border-radius:20px;font-size:12px;cursor:pointer;border:0.5px solid var(--border);color:var(--text-dim);background:transparent;transition:.2s;font-weight:600;letter-spacing:.5px;}
.dpill.on{background:var(--gold);color:#0a0e1a;border-color:var(--gold)}
.task-card{margin:0 16px 12px;background:rgba(255,255,255,0.04);border:0.5px solid var(--border);border-radius:24px;padding:22px;flex-shrink:0;}
.q-label{font-size:10px;color:var(--text-faint);letter-spacing:2px;margin-bottom:12px}
.q-text{font-size:19px;font-weight:700;color:#fff;line-height:1.55;white-space:pre-line;margin-bottom:8px}
.hint-text{font-size:12px;color:rgba(245,200,66,0.6);line-height:1.5}
.answer-card{margin:0 16px;background:rgba(255,255,255,0.03);border:0.5px solid rgba(255,255,255,0.08);border-radius:20px;padding:16px;flex-shrink:0;}
.ans-label{font-size:10px;color:var(--text-faint);letter-spacing:2px;margin-bottom:10px}
.ans-input{width:100%;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.12);border-radius:12px;padding:13px 14px;font-size:16px;color:#fff;outline:none;transition:border-color .2s;}
.ans-input::placeholder{color:rgba(255,255,255,0.2)}
.ans-input:focus{border-color:rgba(245,200,66,0.5);background:rgba(255,255,255,0.08)}
.btn-row{display:flex;gap:10px;margin-top:12px}
.btn-check{flex:1;padding:14px;background:var(--gold);color:#0a0e1a;border:none;border-radius:14px;font-size:14px;font-weight:800;cursor:pointer;transition:.15s;letter-spacing:.5px;}
.btn-check:active{transform:scale(0.97);filter:brightness(0.9)}
.btn-new{padding:14px 18px;background:var(--surface);border:0.5px solid var(--border);border-radius:14px;font-size:14px;color:var(--text-dim);cursor:pointer;transition:.15s;}
.btn-new:active{background:rgba(255,255,255,0.1)}
.result-box{margin:10px 16px 0;padding:13px 16px;border-radius:14px;font-size:13px;font-weight:600;display:none;}
.result-ok{background:rgba(34,197,94,0.15);border:0.5px solid rgba(34,197,94,0.3);color:var(--green)}
.result-err{background:rgba(239,68,68,0.12);border:0.5px solid rgba(239,68,68,0.25);color:var(--red)}
.history-section{margin:14px 16px;flex:1}
.hist-label{font-size:10px;color:var(--text-faint);letter-spacing:2px;margin-bottom:10px}
.hist-items{display:flex;flex-direction:column;gap:6px}
.hist-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,0.03);border-radius:12px;font-size:12px;}
.hdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.hq{flex:1;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ht{color:var(--text-faint);font-variant-numeric:tabular-nums;flex-shrink:0}
.hist-empty{font-size:12px;color:var(--text-faint);text-align:center;padding:20px}
</style>
</head>

<body>
<div class="app">

  <!-- HOME PAGE -->
  <div class="page" id="pg-home">
  <div class="home-bg">
    <div class="status-bar"><span id="sb-time">9:41</span><span>&#9679;&#9679;&#9679;</span></div>
    <div class="app-logo">
      <div class="logo-text">Q<span>MATH</span></div>
      <div class="logo-sub">ТРЕНАЖЁР</div>
    </div>
    <div class="stats-row">
      <div class="stat-pill"><div class="stat-n" id="h-total">0</div><div class="stat-l">ВСЕГО</div></div>
      <div class="stat-pill"><div class="stat-n" id="h-correct">0</div><div class="stat-l">ВЕРНО</div></div>
      <div class="stat-pill"><div class="stat-n" id="h-pct">—</div><div class="stat-l">ТОЧНОСТЬ</div></div>
    </div>
    <div class="section-label">ВЫБЕРИ ТЕМУ</div>
    <div class="topic-list">
      <div class="topic-btn topic-eq" onclick="open_topic('eq')">
        <div class="topic-icon-wrap ico-eq">&#9935;</div>
        <div class="topic-info"><div class="topic-name">Уравнения</div><div class="topic-detail">Линейные · Квадратные · Системы</div></div>
        <div class="topic-arrow">›</div>
      </div>
      <div class="topic-btn topic-geo" onclick="open_topic('geo')">
        <div class="topic-icon-wrap ico-geo">&#9651;</div>
        <div class="topic-info"><div class="topic-name">Планиметрия</div><div class="topic-detail">Треугольники · Площадь · Периметр</div></div>
        <div class="topic-arrow">›</div>
      </div>
      <div class="topic-btn topic-bin" onclick="open_topic('bin')">
        <div class="topic-icon-wrap ico-bin"><span style="font-size:14px;font-weight:800;color:#c084fc">01</span></div>
        <div class="topic-info"><div class="topic-name">Двоичный код</div><div class="topic-detail">Перевод · Сложение · Системы счисл.</div></div>
        <div class="topic-arrow">›</div>
      </div>
    </div>
  </div>
  </div>

  <!-- TASK PAGE -->
  <div class="page hidden-right" id="pg-task">
  <div class="task-bg">
    <div class="task-top">
      <div class="top-row">
        <div class="back-circle" onclick="go_home()">‹</div>
        <div class="topic-badge" id="t-badge">УРАВНЕНИЯ</div>
        <div class="timer-circle">
          <div class="timer-val" id="t-val">00:00</div>
          <div class="timer-start" id="t-btn" onclick="toggle_timer()">▶</div>
        </div>
      </div>
      <div class="diff-row">
        <button class="dpill on" onclick="set_diff('easy',this)">Лёгкий</button>
        <button class="dpill" onclick="set_diff('mid',this)">Средний</button>
        <button class="dpill" onclick="set_diff('hard',this)">Сложный</button>
      </div>
    </div>
    <div class="task-card">
      <div class="q-label">ЗАДАНИЕ</div>
      <div class="q-text" id="q-text">...</div>
      <div class="hint-text" id="q-hint"></div>
    </div>
    <div class="answer-card">
      <div class="ans-label">ОТВЕТ</div>
      <input class="ans-input" id="ans-inp" placeholder="Введи ответ…" onkeydown="if(event.key==='Enter')check()">
      <div class="btn-row">
        <button class="btn-check" onclick="check()">Проверить</button>
        <button class="btn-new" onclick="new_task()">Новое ›</button>
      </div>
    </div>
    <div class="result-box" id="res-box"></div>
    <div class="history-section">
      <div class="hist-label">ИСТОРИЯ</div>
      <div class="hist-items" id="hist-items"><div class="hist-empty">Нет попыток</div></div>
    </div>
  </div>
  </div>

</div>

<script>
function tick(){
  var d=new Date(),h=d.getHours(),m=d.getMinutes();
  var el=document.getElementById('sb-time');
  if(el) el.textContent=(h<10?'0'+h:h)+':'+(m<10?'0'+m:m);
}
tick(); setInterval(tick,30000);

var topic='eq',diff='easy',ans=null,qtext='';
var stats={total:0,correct:0};
var tsec=0,ton=false,tiv=null;
var hist=[];
var badges={eq:'УРАВНЕНИЯ',geo:'ПЛАНИМЕТРИЯ',bin:'ДВОИЧНЫЙ КОД'};

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

function gen(){
  if(topic==='eq') return gen_eq();
  if(topic==='geo') return gen_geo();
  return gen_bin();
}
function gen_eq(){
  if(diff==='easy'){
    var a=rnd(1,9),b=rnd(1,20),x=rnd(1,10);
    return{q:a+'x + '+b+' = '+(a*x+b),h:'Найди x',a:''+x};
  }
  if(diff==='mid'){
    var a=rnd(1,4),b,c,d;
    do{b=rnd(-8,8);c=rnd(-8,8);d=b*b-4*a*c;}
    while(d<0||Math.sqrt(d)!==Math.floor(Math.sqrt(d)));
    var sq=Math.sqrt(d),x1=(-b+sq)/(2*a),x2=(-b-sq)/(2*a);
    var r=x1===x2?''+x1:''+Math.min(x1,x2)+'; '+Math.max(x1,x2);
    return{q:a+'x² + ('+b+')x + ('+c+') = 0',h:'Найди корни уравнения',a:r};
  }
  var a=rnd(1,5),b=rnd(1,5),c=rnd(1,15),d=rnd(1,5),e=rnd(1,5),f=rnd(1,15);
  var det=a*e-b*d;if(!det)return gen_eq();
  var x=(c*e-b*f)/det,y=(a*f-c*d)/det;
  if(!Number.isInteger(x)||!Number.isInteger(y))return gen_eq();
  return{q:a+'x + '+b+'y = '+c+'\n'+d+'x + '+e+'y = '+f,h:'Введи: x; y',a:x+'; '+y};
}
function gen_geo(){
  if(diff==='easy'){
    var a=rnd(3,12),b=rnd(3,12),c=rnd(3,12);
    return{q:'Стороны треугольника:\na='+a+', b='+b+', c='+c+'\nНайди периметр',h:'P = a + b + c',a:''+(a+b+c)};
  }
  if(diff==='mid'){
    var b=rnd(4,14),h=rnd(3,10);
    return{q:'Основание треугольника b='+b+'\nВысота h='+h+'\nНайди площадь',h:'S = ½·b·h',a:''+(b*h/2)};
  }
  var a=rnd(3,8),b=rnd(4,10),C=rnd(30,90);
  var c=Math.round(Math.sqrt(a*a+b*b-2*a*b*Math.cos(C*Math.PI/180))*100)/100;
  return{q:'Стороны a='+a+', b='+b+'\nУгол C='+C+'°\nНайди сторону c',h:'Теорема косинусов',a:''+c};
}
function gen_bin(){
  if(diff==='easy'){
    var n=rnd(1,15);
    return{q:'Переведи в двоичную:\n'+n,h:'Делим на 2, остатки снизу вверх',a:n.toString(2)};
  }
  if(diff==='mid'){
    var n=rnd(8,63);
    return{q:'Переведи в десятичную:\n'+n.toString(2),h:'Умножаем бит на 2^позиция',a:''+n};
  }
  var a=rnd(1,15),b=rnd(1,15);
  return{q:a.toString(2)+' + '+b.toString(2)+' = ?\n(в двоичной)',h:'В десятичной = '+(a+b),a:(a+b).toString(2)};
}

function new_task(){
  var t=gen();qtext=t.q;ans=t.a;
  document.getElementById('q-text').innerText=t.q;
  document.getElementById('q-hint').innerText=t.h;
  document.getElementById('ans-inp').value='';
  var rb=document.getElementById('res-box');
  rb.style.display='none';rb.className='result-box';
  reset_timer();
}
function norm(s){return s.trim().replace(/\s+/g,'').toLowerCase().replace(',','.');}
function check(){
  var v=document.getElementById('ans-inp').value;if(!v.trim())return;
  var ok=norm(v)===norm(ans);
  stats.total++;if(ok)stats.correct++;
  update_stats();
  var rb=document.getElementById('res-box');rb.style.display='block';
  if(ok){rb.className='result-box result-ok';rb.innerText='✓ Верно! Отлично!';}
  else{rb.className='result-box result-err';rb.innerText='✗ Неверно. Ответ: '+ans;}
  add_hist(qtext,ok,tsec);pause_timer();
}
function add_hist(q,ok,s){
  var short=q.replace(/\n/g,' ');if(short.length>35)short=short.substring(0,35)+'…';
  hist.unshift({q:short,ok:ok,s:s});if(hist.length>10)hist.pop();
  render_hist();
}
function render_hist(){
  var el=document.getElementById('hist-items');
  if(!hist.length){el.innerHTML='<div class="hist-empty">Нет попыток</div>';return;}
  el.innerHTML=hist.map(function(h){
    var t=h.s<60?h.s+'с':Math.floor(h.s/60)+'м'+h.s%60+'с';
    return '<div class="hist-item"><div class="hdot" style="background:'+(h.ok?'#4ade80':'#f87171')+'"></div><div class="hq">'+h.q+'</div><div class="ht">'+t+'</div></div>';
  }).join('');
}
function update_stats(){
  document.getElementById('h-total').innerText=stats.total;
  document.getElementById('h-correct').innerText=stats.correct;
  document.getElementById('h-pct').innerText=stats.total>0?Math.round(stats.correct/stats.total*100)+'%':'—';
}
function open_topic(t){
  topic=t;
  document.getElementById('t-badge').innerText=badges[t];
  document.getElementById('pg-home').classList.add('hidden-left');
  document.getElementById('pg-task').classList.remove('hidden-right');
  new_task();
}
function go_home(){
  document.getElementById('pg-task').classList.add('hidden-right');
  document.getElementById('pg-home').classList.remove('hidden-left');
  pause_timer();reset_timer();
}
function set_diff(d,el){
  diff=d;
  document.querySelectorAll('.dpill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');new_task();
}
function toggle_timer(){if(ton)pause_timer();else start_timer();}
function start_timer(){
  ton=true;document.getElementById('t-btn').innerText='⏸';
  tiv=setInterval(function(){
    tsec++;var m=Math.floor(tsec/60),s=tsec%60;
    document.getElementById('t-val').innerText=(m<10?'0'+m:m)+':'+(s<10?'0'+s:s);
  },1000);
}
function pause_timer(){ton=false;clearInterval(tiv);document.getElementById('t-btn').innerText='▶';}
function reset_timer(){pause_timer();tsec=0;document.getElementById('t-val').innerText='00:00';}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(function(){});
}
</script>
</body>
</html>
